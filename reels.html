<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>릴스 레퍼런스 — 조회수 터진 인스타 릴스 모음</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F0F2F5;
      --sidebar-bg: #1A1A2E;
      --sidebar-hover: #16213E;
      --accent: #7C5CFC;
      --accent-light: #A78BFA;
      --card-bg: #FFFFFF;
      --text-primary: #1A1A2E;
      --text-secondary: #6B7280;
      --text-muted: #9CA3AF;
      --border: #E5E7EB;
      --header-h: 60px;
      --sidebar-w: 220px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: #0F0E17;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.35);
    }
    header .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #f09433, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    header .logo-icon svg { width: 18px; height: 18px; fill: #fff; }
    header h1 { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
    header .badge {
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      background: var(--accent); color: #fff; border-radius: 99px;
      letter-spacing: 0.3px;
    }
    header .spacer { flex: 1; }
    header .refresh-btn {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      color: #fff; font-size: 12px; padding: 6px 14px;
      border-radius: 8px; cursor: pointer; transition: background .2s;
    }
    header .refresh-btn:hover { background: rgba(255,255,255,.15); }

    /* ── 레이아웃 ── */
    .layout {
      display: flex;
      margin-top: var(--header-h);
      min-height: calc(100vh - var(--header-h));
    }

    /* ── 사이드바 ── */
    aside.sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--sidebar-bg);
      padding: 20px 0 40px;
      position: sticky;
      top: var(--header-h);
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
    }
    aside.sidebar::-webkit-scrollbar { width: 4px; }
    aside.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }

    .sidebar-section { margin-bottom: 8px; }
    .sidebar-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1px; color: rgba(255,255,255,.35);
      text-transform: uppercase;
      padding: 14px 18px 6px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 18px;
      cursor: pointer;
      color: rgba(255,255,255,.65);
      font-size: 13.5px;
      font-weight: 500;
      border-left: 3px solid transparent;
      transition: all .15s;
    }
    .sidebar-item:hover { background: var(--sidebar-hover); color: #fff; }
    .sidebar-item.active {
      background: var(--sidebar-hover);
      color: #fff;
      border-left-color: var(--accent);
    }
    .sidebar-item .emoji { font-size: 16px; width: 22px; text-align: center; }

    /* ── 메인 ── */
    main.main {
      flex: 1;
      padding: 24px;
      max-width: 1200px;
    }

    /* ── 컨트롤 바 ── */
    .controls {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .controls .section-title {
      font-size: 18px; font-weight: 800; color: var(--text-primary);
      flex: 1; min-width: 160px;
    }
    .controls .section-title span { color: var(--accent); }

    .pill-group {
      display: flex; gap: 4px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
    }
    .pill {
      padding: 5px 14px; border-radius: 7px;
      font-size: 12.5px; font-weight: 600;
      cursor: pointer; border: none; background: transparent;
      color: var(--text-secondary);
      transition: all .15s;
    }
    .pill.active {
      background: var(--accent); color: #fff;
    }
    .pill:not(.active):hover { background: var(--bg); }

    /* ── 현재 카테고리 표시 ── */
    .current-category {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 18px;
    }
    .current-category .cat-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, var(--accent), #A78BFA);
      color: #fff; font-size: 13px; font-weight: 700;
      padding: 5px 14px; border-radius: 99px;
    }
    .current-category .hashtag {
      font-size: 12px; color: var(--text-muted); font-weight: 500;
    }

    /* ── 그리드 ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    /* ── 카드 ── */
    .card {
      background: var(--card-bg);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      transition: transform .2s, box-shadow .2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
    }

    .card-thumb {
      position: relative;
      aspect-ratio: 9/16;
      background: #E5E7EB;
      overflow: hidden;
    }
    .card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-thumb .no-thumb {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1A1A2E, #16213E);
      color: rgba(255,255,255,.4);
      font-size: 28px;
    }
    .card-thumb .no-thumb span { font-size: 11px; margin-top: 8px; }

    /* 조회수 뱃지 */
    .view-badge {
      position: absolute; bottom: 8px; left: 8px;
      background: rgba(0,0,0,.75);
      color: #fff; font-size: 11.5px; font-weight: 700;
      padding: 3px 8px; border-radius: 6px;
      display: flex; align-items: center; gap: 4px;
      backdrop-filter: blur(4px);
    }
    .view-badge svg { width: 11px; height: 11px; fill: #fff; opacity: .8; }

    /* 재생 오버레이 */
    .play-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .2s;
      background: rgba(0,0,0,.25);
    }
    .card:hover .play-overlay { opacity: 1; }
    .play-overlay svg { width: 44px; height: 44px; fill: #fff; filter: drop-shadow(0 2px 8px rgba(0,0,0,.5)); }

    /* 릴스 아이콘 */
    .reels-icon {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,.6);
      border-radius: 6px; padding: 3px 6px;
      display: flex; align-items: center; gap: 3px;
    }
    .reels-icon svg { width: 12px; height: 12px; fill: #fff; }

    .card-info {
      padding: 12px;
    }
    .card-user {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    .card-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      object-fit: cover; background: var(--bg);
      flex-shrink: 0;
    }
    .card-avatar-placeholder {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #A78BFA);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
    }
    .card-username {
      font-size: 12.5px; font-weight: 700; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .card-caption {
      font-size: 11.5px; color: var(--text-secondary);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 10px;
      min-height: 32px;
    }

    .card-stats {
      display: flex; gap: 10px;
      font-size: 11px; color: var(--text-muted); font-weight: 500;
    }
    .card-stats .stat { display: flex; align-items: center; gap: 3px; }
    .card-stats svg { width: 10px; height: 10px; opacity: .6; }

    /* ── 스켈레톤 ── */
    .skeleton { pointer-events: none; }
    .skeleton .card-thumb { background: #E5E7EB; animation: pulse 1.4s ease-in-out infinite; }
    .skel-line {
      height: 10px; border-radius: 5px; background: #E5E7EB;
      animation: pulse 1.4s ease-in-out infinite;
      margin-bottom: 6px;
    }
    .skel-line.short { width: 60%; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .45; }
    }

    /* ── 에러 / 빈 상태 ── */
    .state-box {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .state-box .icon { font-size: 48px; margin-bottom: 12px; }
    .state-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--text-secondary); }
    .state-box p { font-size: 13px; line-height: 1.6; }
    .state-box a { color: var(--accent); }

    /* ── 반응형 ── */
    @media (max-width: 768px) {
      aside.sidebar { display: none; }
      main.main { padding: 16px; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .mobile-cats {
        display: flex; gap: 6px; overflow-x: auto;
        padding-bottom: 10px; margin-bottom: 14px;
        scrollbar-width: none;
      }
      .mobile-cats::-webkit-scrollbar { display: none; }
      .mobile-cat-btn {
        white-space: nowrap; flex-shrink: 0;
        background: #fff; border: 1.5px solid var(--border);
        border-radius: 99px; padding: 6px 14px;
        font-size: 12px; font-weight: 600; cursor: pointer;
        color: var(--text-secondary); transition: all .15s;
      }
      .mobile-cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    }
    @media (min-width: 769px) {
      .mobile-cats { display: none !important; }
    }

    /* ── 어드민 모달 ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.55); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #fff; border-radius: 18px;
      padding: 28px; width: 420px; max-width: 92vw;
      max-height: 80vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .modal h2 { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
    .modal .modal-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
    .modal .pin-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .modal input[type=text], .modal input[type=password] {
      flex: 1; padding: 9px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 13px; outline: none;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal .btn-primary {
      background: var(--accent); color: #fff; border: none;
      padding: 9px 18px; border-radius: 8px; font-size: 13px;
      font-weight: 700; cursor: pointer;
    }
    .modal .btn-primary:hover { opacity: .9; }
    .modal .btn-danger {
      background: #FEE2E2; color: #DC2626; border: none;
      padding: 5px 10px; border-radius: 6px; font-size: 11.5px;
      font-weight: 700; cursor: pointer;
    }
    .modal .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: .8px;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 10px;
    }
    .account-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    .account-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg); border-radius: 8px; padding: 7px 10px;
    }
    .account-row span { flex: 1; font-size: 13px; font-weight: 600; }
    .add-row { display: flex; gap: 8px; }
    .modal .close-btn {
      position: absolute; top: 16px; right: 16px;
      background: var(--bg); border: none; width: 30px; height: 30px;
      border-radius: 50%; font-size: 16px; cursor: pointer; line-height: 30px; text-align: center;
    }
    .modal-inner { position: relative; }
    .admin-btn {
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.7); font-size: 18px; padding: 5px 10px;
      border-radius: 8px; cursor: pointer; line-height: 1;
    }
    .admin-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
    .account-count {
      font-size: 11.5px; color: var(--text-muted); font-weight: 500;
    }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header>
  <div class="logo-icon">
    <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
  </div>
  <h1>릴스 레퍼런스</h1>
  <span class="badge">BETA</span>
  <div class="spacer"></div>
  <button class="admin-btn" onclick="openAdmin()" title="계정 관리">⚙️</button>
  <button class="refresh-btn" onclick="refresh()">새로고침</button>
</header>

<!-- ── 어드민 모달 ── -->
<div class="modal-backdrop" id="adminBackdrop" onclick="closeAdminIfBackdrop(event)">
  <div class="modal modal-inner">
    <button class="close-btn" onclick="closeAdmin()">×</button>
    <h2>계정 관리</h2>
    <p class="modal-sub">카테고리별 추적할 인스타그램 계정을 추가/삭제합니다</p>

    <!-- PIN 입력 (잠금 상태) -->
    <div id="pinSection">
      <div class="pin-row">
        <input type="password" id="pinInput" placeholder="관리자 PIN" maxlength="10"
          onkeydown="if(event.key==='Enter')verifyPin()">
        <button class="btn-primary" onclick="verifyPin()">확인</button>
      </div>
      <p id="pinError" style="color:#DC2626;font-size:12px;display:none">PIN이 틀렸습니다.</p>
    </div>

    <!-- PIN 통과 후 계정 관리 UI -->
    <div id="adminSection" style="display:none">
      <div class="section-label" id="adminCatLabel">음식/맛집 계정</div>
      <div class="account-list" id="accountList"></div>
      <div class="add-row">
        <input type="text" id="newUsername" placeholder="@username (@ 없이 입력)" maxlength="50"
          onkeydown="if(event.key==='Enter')addAccount()">
        <button class="btn-primary" onclick="addAccount()">추가</button>
      </div>
      <p id="addMsg" style="font-size:12px;margin-top:8px;color:var(--text-muted)"></p>
    </div>
  </div>
</div>

<div class="layout">

  <!-- ── 사이드바 ── -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">업종별</div>
      <div class="sidebar-item active" data-cat="food"     onclick="selectCat(this)"><span class="emoji">🍜</span> 음식/맛집</div>
      <div class="sidebar-item"        data-cat="beauty"   onclick="selectCat(this)"><span class="emoji">💄</span> 뷰티/메이크업</div>
      <div class="sidebar-item"        data-cat="fashion"  onclick="selectCat(this)"><span class="emoji">👗</span> 패션/스타일</div>
      <div class="sidebar-item"        data-cat="fitness"  onclick="selectCat(this)"><span class="emoji">💪</span> 피트니스/운동</div>
      <div class="sidebar-item"        data-cat="travel"   onclick="selectCat(this)"><span class="emoji">✈️</span> 여행</div>
      <div class="sidebar-item"        data-cat="lifestyle" onclick="selectCat(this)"><span class="emoji">☀️</span> 라이프스타일</div>
      <div class="sidebar-item"        data-cat="pet"      onclick="selectCat(this)"><span class="emoji">🐶</span> 반려동물</div>
      <div class="sidebar-item"        data-cat="parenting" onclick="selectCat(this)"><span class="emoji">👶</span> 육아</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">포맷별</div>
      <div class="sidebar-item" data-cat="tutorial"    onclick="selectCat(this)"><span class="emoji">📋</span> 튜토리얼</div>
      <div class="sidebar-item" data-cat="beforeafter" onclick="selectCat(this)"><span class="emoji">🔄</span> Before &amp; After</div>
      <div class="sidebar-item" data-cat="challenge"   onclick="selectCat(this)"><span class="emoji">🔥</span> 챌린지/트렌드</div>
      <div class="sidebar-item" data-cat="vlog"        onclick="selectCat(this)"><span class="emoji">📹</span> Vlog</div>
      <div class="sidebar-item" data-cat="unboxing"    onclick="selectCat(this)"><span class="emoji">📦</span> 언박싱</div>
      <div class="sidebar-item" data-cat="storytime"   onclick="selectCat(this)"><span class="emoji">💬</span> 스토리텔링</div>
    </div>
  </aside>

  <!-- ── 메인 ── -->
  <main class="main">

    <!-- 모바일 카테고리 -->
    <div class="mobile-cats" id="mobileCats">
      <button class="mobile-cat-btn active" data-cat="food"      onclick="selectMobileCat(this)">🍜 음식/맛집</button>
      <button class="mobile-cat-btn"        data-cat="beauty"    onclick="selectMobileCat(this)">💄 뷰티</button>
      <button class="mobile-cat-btn"        data-cat="fashion"   onclick="selectMobileCat(this)">👗 패션</button>
      <button class="mobile-cat-btn"        data-cat="fitness"   onclick="selectMobileCat(this)">💪 피트니스</button>
      <button class="mobile-cat-btn"        data-cat="travel"    onclick="selectMobileCat(this)">✈️ 여행</button>
      <button class="mobile-cat-btn"        data-cat="lifestyle" onclick="selectMobileCat(this)">☀️ 라이프</button>
      <button class="mobile-cat-btn"        data-cat="pet"       onclick="selectMobileCat(this)">🐶 반려동물</button>
      <button class="mobile-cat-btn"        data-cat="parenting" onclick="selectMobileCat(this)">👶 육아</button>
      <button class="mobile-cat-btn"        data-cat="tutorial"  onclick="selectMobileCat(this)">📋 튜토리얼</button>
      <button class="mobile-cat-btn"        data-cat="beforeafter" onclick="selectMobileCat(this)">🔄 Before&After</button>
      <button class="mobile-cat-btn"        data-cat="challenge" onclick="selectMobileCat(this)">🔥 챌린지</button>
      <button class="mobile-cat-btn"        data-cat="vlog"      onclick="selectMobileCat(this)">📹 Vlog</button>
      <button class="mobile-cat-btn"        data-cat="unboxing"  onclick="selectMobileCat(this)">📦 언박싱</button>
      <button class="mobile-cat-btn"        data-cat="storytime" onclick="selectMobileCat(this)">💬 스토리텔링</button>
    </div>

    <!-- 컨트롤 바 -->
    <div class="controls">
      <div class="section-title" id="sectionTitle">음식/맛집 <span>릴스</span></div>

      <div class="pill-group" id="periodPills">
        <button class="pill" data-period="7"   onclick="selectPeriod(this)">7일</button>
        <button class="pill active" data-period="30" onclick="selectPeriod(this)">30일</button>
        <button class="pill" data-period="90"  onclick="selectPeriod(this)">3개월</button>
        <button class="pill" data-period="0"   onclick="selectPeriod(this)">전체</button>
      </div>

      <div class="pill-group" id="sortPills">
        <button class="pill active" data-sort="views"  onclick="selectSort(this)">조회수순</button>
        <button class="pill"        data-sort="recent" onclick="selectSort(this)">최신순</button>
      </div>
    </div>

    <!-- 현재 카테고리 태그 -->
    <div class="current-category" id="currentCatRow">
      <span class="cat-tag" id="catTag">🍜 음식/맛집</span>
      <span class="account-count" id="accountCountLabel">계정 불러오는 중…</span>
    </div>

    <!-- 릴스 그리드 -->
    <div class="grid" id="reelsGrid">
      <!-- JS로 채워짐 -->
    </div>

  </main>
</div>

<script>
// ── 카테고리 메타데이터 ──
const CATEGORIES = {
  food:        { label: '음식/맛집',     emoji: '🍜' },
  beauty:      { label: '뷰티/메이크업', emoji: '💄' },
  fashion:     { label: '패션/스타일',   emoji: '👗' },
  fitness:     { label: '피트니스/운동', emoji: '💪' },
  travel:      { label: '여행',          emoji: '✈️' },
  lifestyle:   { label: '라이프스타일',  emoji: '☀️' },
  pet:         { label: '반려동물',      emoji: '🐶' },
  parenting:   { label: '육아',          emoji: '👶' },
  tutorial:    { label: '튜토리얼',      emoji: '📋' },
  beforeafter: { label: 'Before & After',emoji: '🔄' },
  challenge:   { label: '챌린지/트렌드', emoji: '🔥' },
  vlog:        { label: 'Vlog',          emoji: '📹' },
  unboxing:    { label: '언박싱',        emoji: '📦' },
  storytime:   { label: '스토리텔링',    emoji: '💬' },
};

// ── 상태 ──
let state = { cat: 'food', period: '30', sort: 'views', loading: false };

// ── 유틸 ──
function fmt(n) {
  if (!n && n !== 0) return '-';
  if (n >= 1e8) return (n / 1e8).toFixed(1) + '억';
  if (n >= 1e4) return (n / 1e4).toFixed(1) + '만';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

function relTime(ts) {
  if (!ts) return '';
  const diff = Math.floor(Date.now() / 1000) - ts;
  if (diff < 3600)  return Math.floor(diff / 60) + '분 전';
  if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
  if (diff < 86400 * 30) return Math.floor(diff / 86400) + '일 전';
  if (diff < 86400 * 365) return Math.floor(diff / (86400 * 30)) + '개월 전';
  return Math.floor(diff / (86400 * 365)) + '년 전';
}

function avatarInitial(username) {
  return (username || '?')[0].toUpperCase();
}

// ── 스켈레톤 렌더 ──
function renderSkeletons(n = 12) {
  const g = document.getElementById('reelsGrid');
  g.innerHTML = Array.from({ length: n }, () => `
    <div class="card skeleton">
      <div class="card-thumb" style="animation:pulse 1.4s ease-in-out infinite"></div>
      <div class="card-info">
        <div class="skel-line" style="width:40%;margin-bottom:10px"></div>
        <div class="skel-line"></div>
        <div class="skel-line short"></div>
      </div>
    </div>`).join('');
}

// ── 카드 렌더 ──
function renderCard(item) {
  const url = item.shortcode ? `https://www.instagram.com/reels/${item.shortcode}/` : '#';
  const thumb = item.thumbnail || '';
  const thumbHtml = thumb
    ? `<img src="${thumb}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
  const fallback = `<div class="no-thumb" style="${thumb ? 'display:none' : ''}">📹<span>미리보기 없음</span></div>`;

  const avatarHtml = item.profilePic
    ? `<img class="card-avatar" src="${item.profilePic}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
  const avatarFallback = `<div class="card-avatar-placeholder" style="${item.profilePic ? 'display:none' : ''}">${avatarInitial(item.username)}</div>`;

  const captionText = (item.caption || '').slice(0, 80).replace(/\n/g, ' ');

  return `
    <a class="card" href="${url}" target="_blank" rel="noopener">
      <div class="card-thumb">
        ${thumbHtml}${fallback}
        <div class="play-overlay">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="view-badge">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          ${fmt(item.viewCount)}
        </div>
        <div class="reels-icon">
          <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
        </div>
      </div>
      <div class="card-info">
        <div class="card-user">
          ${avatarHtml}${avatarFallback}
          <span class="card-username">@${item.username || '알수없음'}</span>
        </div>
        <div class="card-caption">${captionText || '(캡션 없음)'}</div>
        <div class="card-stats">
          <span class="stat">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            ${fmt(item.likeCount)}
          </span>
          <span class="stat">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18z"/></svg>
            ${fmt(item.commentCount)}
          </span>
          <span style="margin-left:auto;color:var(--text-muted);font-size:10.5px">${relTime(item.takenAt)}</span>
        </div>
      </div>
    </a>`;
}

// ── 에러/빈 상태 렌더 ──
function renderError(msg) {
  document.getElementById('reelsGrid').innerHTML = `
    <div class="state-box">
      <div class="icon">⚠️</div>
      <h3>데이터를 불러올 수 없어요</h3>
      <p>${msg}<br><br>
      <a href="https://rapidapi.com/search/instagram" target="_blank" rel="noopener">RapidAPI에서 Instagram API 구독 →</a></p>
    </div>`;
}

function renderEmpty(notice) {
  const isNoAccounts = notice && notice.includes('등록된 계정이 없습니다');
  const isUidFail = notice && notice.includes('user_id');
  let icon = '🔍', title = '해당 기간에 결과가 없어요', desc = '"전체" 탭을 눌러서 기간 제한 없이 조회해보세요.';
  if (isNoAccounts) { icon = '📋'; title = '추적 계정이 없어요'; desc = '⚙️ 설정 버튼을 눌러 계정을 추가해주세요.'; }
  if (isUidFail)   { icon = '⚠️'; title = 'user_id 조회 실패'; desc = 'userinfo API 엔드포인트를 찾지 못했어요.<br><code style="font-size:11px;background:#f4f4f4;padding:2px 6px;border-radius:4px">/api/reels-debug?pin=PIN&username=paik_jk</code><br>에 접속해서 작동하는 URL을 확인해주세요.'; }
  document.getElementById('reelsGrid').innerHTML = `
    <div class="state-box">
      <div class="icon">${icon}</div>
      <h3>${title}</h3>
      <p>${desc}</p>
    </div>`;
}

// ── 데이터 로드 ──
async function loadReels() {
  if (state.loading) return;
  state.loading = true;
  renderSkeletons();

  try {
    const params = new URLSearchParams({
      category: state.cat,
      period: state.period,
      sort: state.sort,
    });
    const res = await fetch('/api/reels-data?' + params);
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      renderError(err.error || '알 수 없는 오류');
      return;
    }
    const data = await res.json();
    if (!data.items || data.items.length === 0) {
      renderEmpty(data.notice);
      return;
    }
    // 계정 수 업데이트
    if (data.accountCount !== undefined) {
      document.getElementById('accountCountLabel').textContent = `${data.accountCount}개 계정 추적 중`;
    }
    document.getElementById('reelsGrid').innerHTML = data.items.map(renderCard).join('');
  } catch (e) {
    renderError('네트워크 오류: ' + e.message);
  } finally {
    state.loading = false;
  }
}

// ── 이벤트 핸들러 ──
function selectCat(el) {
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  state.cat = el.dataset.cat;
  updateCatUI();
  loadReels();
}

function selectMobileCat(el) {
  document.querySelectorAll('.mobile-cat-btn').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  state.cat = el.dataset.cat;
  updateCatUI();
  loadReels();
}

function selectPeriod(el) {
  document.querySelectorAll('#periodPills .pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  state.period = el.dataset.period;
  loadReels();
}

function selectSort(el) {
  document.querySelectorAll('#sortPills .pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  state.sort = el.dataset.sort;
  loadReels();
}

function refresh() {
  loadReels();
}

function updateCatUI() {
  const meta = CATEGORIES[state.cat] || { label: state.cat, emoji: '🔍' };
  document.getElementById('sectionTitle').innerHTML = `${meta.label} <span>릴스</span>`;
  document.getElementById('catTag').textContent = `${meta.emoji} ${meta.label}`;
  document.getElementById('accountCountLabel').textContent = '계정 불러오는 중…';
}

// ── 어드민 모달 ──
let adminPin = null;

function openAdmin() {
  document.getElementById('adminBackdrop').classList.add('open');
  document.getElementById('pinInput').value = '';
  document.getElementById('pinError').style.display = 'none';
  if (adminPin) {
    document.getElementById('pinSection').style.display = 'none';
    document.getElementById('adminSection').style.display = 'block';
    renderAdminAccounts();
  } else {
    document.getElementById('pinSection').style.display = 'block';
    document.getElementById('adminSection').style.display = 'none';
    setTimeout(() => document.getElementById('pinInput').focus(), 100);
  }
}

function closeAdmin() {
  document.getElementById('adminBackdrop').classList.remove('open');
}

function closeAdminIfBackdrop(e) {
  if (e.target === document.getElementById('adminBackdrop')) closeAdmin();
}

async function verifyPin() {
  const pin = document.getElementById('pinInput').value;
  const res = await fetch(`/api/reels-manage?pin=${pin}&category=${state.cat}`);
  if (res.status === 401) {
    document.getElementById('pinError').style.display = 'block';
    return;
  }
  adminPin = pin;
  const data = await res.json();
  document.getElementById('pinSection').style.display = 'none';
  document.getElementById('adminSection').style.display = 'block';
  renderAdminAccountsData(data.accounts || []);
}

async function renderAdminAccounts() {
  const res = await fetch(`/api/reels-manage?pin=${adminPin}&category=${state.cat}`);
  const data = await res.json();
  renderAdminAccountsData(data.accounts || []);
}

function renderAdminAccountsData(accounts) {
  const meta = CATEGORIES[state.cat] || { label: state.cat };
  document.getElementById('adminCatLabel').textContent = `${meta.label} 계정 (${accounts.length}개)`;
  document.getElementById('accountList').innerHTML = accounts.length === 0
    ? '<p style="font-size:12px;color:var(--text-muted)">등록된 계정이 없습니다.</p>'
    : accounts.map(a => {
        const username = a.username ?? a;
        const uid = a.user_id ? `<span style="font-size:10px;color:var(--text-muted);margin-left:4px">ID: ${a.user_id}</span>` : '';
        return `
          <div class="account-row">
            <span>@${username}${uid}</span>
            <button class="btn-danger" onclick="removeAccount('${username}')">삭제</button>
          </div>`;
      }).join('');
  document.getElementById('accountCountLabel').textContent = `${accounts.length}개 계정 추적 중`;
}

async function addAccount() {
  const username = document.getElementById('newUsername').value.replace(/^@/, '').trim();
  if (!username) return;
  const msg = document.getElementById('addMsg');
  msg.textContent = '추가 중…';
  msg.style.color = 'var(--text-muted)';
  const res = await fetch('/api/reels-manage', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pin: adminPin, category: state.cat, username }),
  });
  const data = await res.json();
  if (res.ok) {
    document.getElementById('newUsername').value = '';
    msg.textContent = `@${username} 추가됨!`;
    msg.style.color = '#059669';
    renderAdminAccountsData(data.accounts);
    loadReels();
  } else {
    msg.textContent = data.error || '오류 발생';
    msg.style.color = '#DC2626';
  }
}

async function removeAccount(username) {
  const res = await fetch(`/api/reels-manage?pin=${adminPin}&category=${state.cat}&username=${username}`, {
    method: 'DELETE',
  });
  const data = await res.json();
  if (res.ok) {
    renderAdminAccountsData(data.accounts);
    loadReels();
  }
}

// ── 초기 로드 ──
loadReels();
</script>
</body>
</html>
