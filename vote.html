<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리그 MVP 투표 · 월문FC</title>
  <style>
    :root {
      --primary: #2bbfbf;
      --primary-dark: #1a9a9a;
      --bg: #f0fafa;
      --card: #fff;
      --border: #e0f0f0;
      --muted: #8a9aaa;
      --text: #1a2a3a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 0 0 60px;
    }

    /* 헤더 */
    .vote-header {
      background: var(--primary);
      padding: 20px 20px 24px;
      text-align: center;
      color: #fff;
    }
    .vote-header .back {
      display: inline-block; font-size: 13px; color: rgba(255,255,255,0.8);
      text-decoration: none; margin-bottom: 12px;
    }
    .vote-header .tag {
      font-size: 11px; letter-spacing: 2px; font-weight: 700;
      opacity: 0.75; margin-bottom: 6px;
    }
    .vote-header h1 { font-size: 24px; font-weight: 900; margin-bottom: 6px; }
    .vote-header p { font-size: 13px; opacity: 0.85; }

    /* 상태 배너 */
    .status-banner {
      margin: 20px 16px 0;
      background: #fff3cd; border-radius: 12px;
      padding: 12px 16px; font-size: 13px; color: #856404;
      text-align: center; display: none;
    }
    .status-banner.voted { background: #d1f5ea; color: #0a6640; display: block; }

    /* 후보 카드 */
    .candidates { padding: 20px 16px 0; display: flex; flex-direction: column; gap: 14px; }

    .candidate-card {
      background: var(--card); border-radius: 18px;
      border: 2.5px solid var(--border);
      padding: 20px 20px 16px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      position: relative; overflow: hidden;
    }
    .candidate-card:active { transform: scale(0.98); }
    .candidate-card.selected {
      border-color: var(--primary);
      box-shadow: 0 4px 20px rgba(43,191,191,0.25);
    }
    .candidate-card.selected::after {
      content: '✓'; position: absolute; top: 14px; right: 16px;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--primary); color: #fff;
      font-size: 14px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
    }

    .card-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .candidate-num {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--bg); border: 2px solid var(--border);
      font-size: 14px; font-weight: 700; color: var(--primary);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .selected .candidate-num { background: var(--primary); border-color: var(--primary); color: #fff; }
    .candidate-info { flex: 1; }
    .candidate-name { font-size: 20px; font-weight: 900; }
    .candidate-team { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .candidate-photo-wrap {
      width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid var(--border); overflow: hidden;
    }
    .selected .candidate-photo-wrap { border-color: var(--primary); }
    .candidate-photo {
      width: 100%; height: 100%; object-fit: cover;
      object-position: center top;
    }
    .candidate-photo.zoom { transform: scale(1.7); transform-origin: 50% 25%; }

    /* 결과 바 */
    .result-wrap { display: none; }
    .result-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    .result-bar-bg { background: var(--bg); border-radius: 99px; height: 8px; overflow: hidden; }
    .result-bar { height: 100%; border-radius: 99px; background: var(--border); transition: width 0.6s ease; }
    .selected .result-bar { background: var(--primary); }

    /* 투표자 이름 */
    .voter-name-wrap { margin-bottom: 14px; }
    .voter-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 700; }
    .voter-input {
      width: 100%; padding: 14px 16px; font-size: 15px;
      border: 2px solid var(--border); border-radius: 12px;
      font-family: inherit; color: var(--text); background: var(--card);
      outline: none; transition: border-color 0.2s;
    }
    .voter-input:focus { border-color: var(--primary); }
    .voter-input:disabled { background: var(--bg); color: var(--muted); }

    /* 투표 버튼 */
    .vote-section { padding: 24px 16px 0; }
    .vote-btn {
      width: 100%; padding: 16px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 14px;
      font-size: 17px; font-weight: 800;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(43,191,191,0.3);
    }
    .vote-btn:disabled {
      background: #ccc; box-shadow: none; cursor: default;
    }
    .vote-btn:not(:disabled):active { transform: scale(0.98); }
    .vote-hint { text-align: center; font-size: 12px; color: var(--muted); margin-top: 10px; }

    /* 총 투표수 */
    .total-votes {
      text-align: center; font-size: 13px; color: var(--muted);
      margin-top: 20px; padding: 0 16px;
    }
    .total-votes strong { color: var(--primary); }

    /* 투표자 명단 (집계자 전용) */
    .voter-list {
      margin: 14px 16px 0; background: var(--card);
      border: 2px solid var(--border); border-radius: 14px;
      padding: 14px 16px; font-size: 13px;
    }
    .voter-list .voter-row { display: flex; gap: 8px; line-height: 1.6; }
    .voter-list .voter-row + .voter-row { margin-top: 6px; }
    .voter-list .voter-row b { color: var(--primary); flex-shrink: 0; }
    .voter-list .voter-row span { color: var(--text); }

    /* 관리자 결과보기 */
    .admin-btn {
      display: block; margin: 10px auto 0;
      background: none; border: none;
      font-size: 12px; color: var(--muted);
      text-decoration: underline; cursor: pointer;
      padding: 8px;
    }
  </style>
</head>
<body>

<div class="vote-header">
  <a href="index.html" class="back">← 홈으로</a>
  <div class="tag">VOTE</div>
  <h1>🌟 리그 MVP 투표</h1>
  <p>2026 월문FC · 이름 확인 후 1인 1표</p>
</div>

<div class="status-banner" id="statusBanner"></div>

<div class="candidates" id="candidateList">

  <div class="candidate-card" id="card-0" onclick="selectCandidate(0)">
    <div class="card-top">
      <div class="candidate-num">1</div>
      <div class="candidate-info">
        <div class="candidate-name">강기빈</div>
        <div class="candidate-team">탱크로 밀어붙이는 강력한 공격본능</div>
      </div>
      <div class="candidate-photo-wrap"><img src="IMG_3456.jpeg" class="candidate-photo" alt="강기빈" /></div>
    </div>
    <div class="result-wrap" id="result-0">
      <div class="result-label"><span>득표</span><span><strong id="cnt-0">0</strong>표 (<span id="pct-0">0%</span>)</span></div>
      <div class="result-bar-bg"><div class="result-bar" id="bar-0" style="width:0%"></div></div>
    </div>
  </div>

  <div class="candidate-card" id="card-1" onclick="selectCandidate(1)">
    <div class="card-top">
      <div class="candidate-num">2</div>
      <div class="candidate-info">
        <div class="candidate-name">김태향</div>
        <div class="candidate-team">활발한 운동량 공수 멀티플레이어</div>
      </div>
      <div class="candidate-photo-wrap"><img src="IMG_3350.jpeg" class="candidate-photo zoom" alt="김태향" /></div>
    </div>
    <div class="result-wrap" id="result-1">
      <div class="result-label"><span>득표</span><span><strong id="cnt-1">0</strong>표 (<span id="pct-1">0%</span>)</span></div>
      <div class="result-bar-bg"><div class="result-bar" id="bar-1" style="width:0%"></div></div>
    </div>
  </div>

  <div class="candidate-card" id="card-2" onclick="selectCandidate(2)">
    <div class="card-top">
      <div class="candidate-num">3</div>
      <div class="candidate-info">
        <div class="candidate-name">박상현</div>
        <div class="candidate-team">환상적인 골키핑능력 중원의 지휘자</div>
      </div>
      <div class="candidate-photo-wrap"><img src="IMG_3455.jpeg" class="candidate-photo zoom" alt="박상현" /></div>
    </div>
    <div class="result-wrap" id="result-2">
      <div class="result-label"><span>득표</span><span><strong id="cnt-2">0</strong>표 (<span id="pct-2">0%</span>)</span></div>
      <div class="result-bar-bg"><div class="result-bar" id="bar-2" style="width:0%"></div></div>
    </div>
  </div>

</div>

<div class="vote-section">
  <div class="voter-name-wrap">
    <label for="voterName" class="voter-label">투표자 이름</label>
    <input type="text" id="voterName" class="voter-input" placeholder="이름을 입력하세요" oninput="checkReady()">
  </div>
  <button class="vote-btn" id="voteBtn" disabled onclick="submitVote()">후보를 선택해주세요</button>
  <p class="vote-hint" id="voteHint">한 사람당 한 번만 투표할 수 있습니다</p>
  <div class="total-votes" id="totalVotes" style="display:none"></div>
  <div class="voter-list" id="voterList" style="display:none"></div>
  <button class="admin-btn" id="adminBtn" onclick="showResults()">📊 결과 보기 (집계자)</button>
  <button class="admin-btn" id="resetBtn" onclick="resetVotes()">🗑️ 투표 초기화 (집계자)</button>
</div>

<script>
  const STORAGE_KEY = 'wolmun_mvp_vote_v2';
  let selected = -1;
  let myVote = localStorage.getItem(STORAGE_KEY);

  function selectCandidate(idx) {
    if (myVote !== null) return;
    selected = idx;
    document.querySelectorAll('.candidate-card').forEach((c, i) => {
      c.classList.toggle('selected', i === idx);
    });
    checkReady();
  }

  function checkReady() {
    if (myVote !== null) return;
    const name = document.getElementById('voterName').value.trim();
    const btn = document.getElementById('voteBtn');
    if (selected !== -1 && name !== '') {
      btn.disabled = false;
      btn.textContent = '투표하기 ✓';
    } else {
      btn.disabled = true;
      btn.textContent = selected === -1 ? '후보를 선택해주세요' : '이름을 입력해주세요';
    }
  }

  async function submitVote() {
    const name = document.getElementById('voterName').value.trim();
    if (selected === -1 || name === '' || myVote !== null) return;
    const btn = document.getElementById('voteBtn');
    btn.disabled = true;
    btn.textContent = '처리 중...';
    try {
      const res = await fetch('/api/vote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ candidate: selected, name })
      });
      if (res.status === 409) {
        alert('이미 투표한 이름입니다.');
        checkReady();
        return;
      }
      if (!res.ok) {
        alert('오류가 발생했습니다. 다시 시도해주세요.');
        checkReady();
        return;
      }
      localStorage.setItem(STORAGE_KEY, String(selected));
      myVote = String(selected);
      markVoted();
    } catch (e) {
      alert('네트워크 오류가 발생했습니다. 다시 시도해주세요.');
      checkReady();
    }
  }

  function markVoted() {
    const btn = document.getElementById('voteBtn');
    btn.disabled = true;
    btn.textContent = '투표 완료!';
    document.getElementById('voteHint').style.display = 'none';
    const banner = document.getElementById('statusBanner');
    banner.classList.add('voted');
    banner.textContent = '✅ 투표가 완료되었습니다. 수고하셨습니다.';
    document.querySelectorAll('.candidate-card').forEach(c => c.style.cursor = 'default');
    document.getElementById('voterName').disabled = true;
  }

  async function showResults() {
    const pin = prompt('집계자 PIN을 입력하세요');
    if (pin === null) return;
    let data;
    try {
      const res = await fetch('/api/results?pin=' + encodeURIComponent(pin));
      if (res.status === 403) {
        alert('PIN이 올바르지 않습니다.');
        return;
      }
      if (!res.ok) {
        alert('결과를 불러오지 못했습니다.');
        return;
      }
      data = await res.json();
    } catch (e) {
      alert('네트워크 오류가 발생했습니다.');
      return;
    }

    const { votes, voters } = data;
    const total = votes.reduce((a, b) => a + b, 0);
    document.querySelectorAll('.result-wrap').forEach(el => el.style.display = 'block');
    votes.forEach((v, i) => {
      const pct = total > 0 ? Math.round(v / total * 100) : 0;
      document.getElementById('cnt-' + i).textContent = v;
      document.getElementById('pct-' + i).textContent = pct + '%';
      setTimeout(() => { document.getElementById('bar-' + i).style.width = pct + '%'; }, 50);
    });
    document.getElementById('totalVotes').style.display = 'block';
    document.getElementById('totalVotes').innerHTML = '총 <strong>' + total + '표</strong>';

    const names = document.querySelectorAll('.candidate-name');
    const listEl = document.getElementById('voterList');
    listEl.innerHTML = voters.map((list, i) => {
      const label = names[i] ? names[i].textContent : ('후보 ' + (i + 1));
      const value = list.length > 0 ? list.join(', ') : '-';
      return '<div class="voter-row"><b>' + label + '</b><span>: ' + value + '</span></div>';
    }).join('');
    listEl.style.display = 'block';
  }

  async function resetVotes() {
    const pin = prompt('집계자 PIN을 입력하세요');
    if (pin === null) return;
    if (!confirm('정말 모든 투표 기록을 초기화할까요? 되돌릴 수 없습니다.')) return;
    try {
      const res = await fetch('/api/reset?pin=' + encodeURIComponent(pin));
      if (res.status === 403) {
        alert('PIN이 올바르지 않습니다.');
        return;
      }
      if (!res.ok) {
        alert('초기화에 실패했습니다.');
        return;
      }
      alert('투표 기록이 초기화되었습니다.');
    } catch (e) {
      alert('네트워크 오류가 발생했습니다.');
    }
  }

  if (myVote !== null) {
    selected = parseInt(myVote);
    document.getElementById('card-' + selected).classList.add('selected');
    markVoted();
  }
</script>

</body>
</html>
