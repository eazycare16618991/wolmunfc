<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>야유회·컨테이너 납부 현황 · 월문FC</title>
  <style>
    :root {
      --primary: #2bbfbf;
      --bg: #f0fafa;
      --card: #fff;
      --border: #e0f0f0;
      --muted: #8a9aaa;
      --text: #1a2a3a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px;
    }
    .page-header {
      background: var(--primary); color: #fff;
      padding: 20px 20px 24px; text-align: center;
    }
    .page-header a { display: inline-block; font-size: 13px; color: rgba(255,255,255,0.8); text-decoration: none; margin-bottom: 10px; }
    .page-header .tag { font-size: 11px; letter-spacing: 2px; font-weight: 700; opacity: 0.75; margin-bottom: 6px; }
    .page-header h1 { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
    .page-header p { font-size: 13px; opacity: 0.85; }

    .fee-info { display: flex; gap: 10px; padding: 16px 16px 0; }
    .fee-badge {
      flex: 1; background: var(--card); border-radius: 12px;
      padding: 12px 14px; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .fee-badge .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .fee-badge .amount { font-size: 18px; font-weight: 900; color: var(--primary); }

    .summary-bar {
      display: flex; gap: 10px; padding: 10px 16px 0;
    }
    .sum-badge {
      flex: 1; background: var(--card); border-radius: 10px;
      padding: 10px 12px; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .sum-badge .sl { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    .sum-badge .sv { font-size: 15px; font-weight: 900; color: var(--text); }
    .sum-badge.paid .sv { color: #0a6640; }
    .sum-badge.unpaid .sv { color: #a02020; }

    .table-wrap {
      margin: 14px 16px; background: var(--card);
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 520px; }
    thead tr { background: var(--primary); }
    thead th {
      color: #fff; padding: 11px 10px; font-size: 12px;
      font-weight: 700; text-align: center; white-space: nowrap;
    }
    thead th:first-child { text-align: left; padding-left: 16px; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr.paid-row td:first-child { color: var(--muted); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover td { background: #f7fdfd; }
    tbody td { padding: 10px 10px; font-size: 13px; text-align: center; white-space: nowrap; }
    tbody td:first-child { text-align: left; padding-left: 16px; font-weight: 700; font-size: 14px; }

    .toggle-btn {
      display: inline-block; padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; cursor: pointer;
      border: none; transition: all 0.15s;
    }
    .toggle-btn.join  { background: #d1f5ea; color: #0a6640; }
    .toggle-btn.nojoin{ background: #f5e0e0; color: #a02020; }
    .toggle-btn.paid  { background: #d1f5ea; color: #0a6640; }
    .toggle-btn.unpaid{ background: #ffeeba; color: #856404; }

    .amount { font-variant-numeric: tabular-nums; }
    .amount.zero { color: #ccc; }
    td.total-col { font-weight: 800; color: var(--primary); }

    .subtotal-row td {
      background: #e8f8f8; font-weight: 800; font-size: 13px;
      border-top: 2px solid var(--primary);
    }
    .subtotal-row td:first-child { color: var(--primary); }
    .note { padding: 10px 16px 0; font-size: 11px; color: var(--muted); text-align: center; }
  </style>
</head>
<body>

<div class="page-header">
  <a href="index.html">← 홈으로</a>
  <div class="tag">PAYMENT</div>
  <h1>💰 야유회·컨테이너 납부 현황</h1>
  <p>2026 월문FC · 항목 탭으로 상태 변경</p>
</div>

<div class="fee-info">
  <div class="fee-badge">
    <div class="label">🏕️ 야유회비</div>
    <div class="amount">30,000원</div>
  </div>
  <div class="fee-badge">
    <div class="label">🔧 컨테이너수리비</div>
    <div class="amount">10,000원</div>
  </div>
</div>

<div class="summary-bar">
  <div class="sum-badge paid">
    <div class="sl">✅ 납부완료</div>
    <div class="sv" id="sum-paid">0명</div>
  </div>
  <div class="sum-badge unpaid">
    <div class="sl">⏳ 미납</div>
    <div class="sv" id="sum-unpaid">0명</div>
  </div>
  <div class="sum-badge">
    <div class="sl">💵 수령액</div>
    <div class="sv" id="sum-amount">0원</div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>회원명</th>
        <th>야유회</th>
        <th>야유회비</th>
        <th>컨테이너비</th>
        <th>합계</th>
        <th>납부</th>
      </tr>
    </thead>
    <tbody id="payBody"></tbody>
    <tfoot>
      <tr class="subtotal-row">
        <td>소 계</td>
        <td id="sub-join"></td>
        <td id="sub-outing" class="amount"></td>
        <td id="sub-container" class="amount"></td>
        <td id="sub-total" class="amount total-col"></td>
        <td id="sub-paid"></td>
      </tr>
    </tfoot>
  </table>
</div>
<p class="note">* 야유회참가·납부 항목 탭으로 변경 · 이 기기에 저장됩니다</p>

<script>
  const MEMBERS = [
    '강기빈','김동수','김병묵','김성록','김성현','김인','김준현','김지훈','김찬희',
    '김태향','김태홍','김현','남궁기남','남궁훈','도지성','박상현','박영록',
    '박영수','박찬빈','방선우','우성길','이인표','이형일','이형준','전원표',
    '전재민','정종환','정해승','조성인','채동훈','채유민','채은일','최만식',
    '홍래균','황인성'
  ];
  const OUTING_FEE = 30000;
  const CONTAINER_FEE = 10000;
  const KEY_JOIN = 'wm_pay_join';
  const KEY_PAID = 'wm_pay_paid';

  // 입금내역 기반 초기값
  const DEFAULT_NOJOIN = new Set(['김동수','방선우','도지성','박영록','정종환','박상현','김태향','김인','채은일','김지훈','김성록']);
  const DEFAULT_PAID   = new Set(['강기빈','최만식','전재민','우성길','김동수','방선우','도지성','박영록','정종환','박상현','조성인','김태향','김인','채은일','김지훈','김성록','김병묵']);
  const EXEMPT_OUTING  = new Set(['김지훈','김태향','박상현','정종환']); // 운영진 야유회비 면제

  function load(key) { try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch { return null; } }
  function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

  function getJoin() { return load(KEY_JOIN) || {}; }
  function getPaid() { return load(KEY_PAID) || {}; }

  function isJoin(name, joinState) {
    if (name in joinState) return joinState[name];
    return !DEFAULT_NOJOIN.has(name);
  }
  function isPaid(name, paidState) {
    if (name in paidState) return paidState[name];
    return DEFAULT_PAID.has(name);
  }

  function toggleJoin(name) {
    const s = getJoin(); s[name] = !isJoin(name, s); save(KEY_JOIN, s); render();
  }
  function togglePaid(name) {
    const s = getPaid(); s[name] = !isPaid(name, s); save(KEY_PAID, s); render();
  }

  function fmt(n) { return n === 0 ? '<span class="amount zero">—</span>' : n.toLocaleString() + '원'; }

  function render() {
    const joinState = getJoin(), paidState = getPaid();
    const tbody = document.getElementById('payBody');
    let sumOuting=0, sumContainer=0, sumTotal=0, joinCount=0, paidCount=0, paidAmt=0;

    tbody.innerHTML = MEMBERS.map(name => {
      const exempt = EXEMPT_OUTING.has(name);
      const join = isJoin(name, joinState);
      const paid = isPaid(name, paidState);
      const outing = exempt ? 0 : (join ? OUTING_FEE : 0);
      const container = CONTAINER_FEE;
      const total = outing + container;
      sumOuting += outing; sumContainer += container; sumTotal += total;
      if (!exempt && join) joinCount++;
      if (paid) { paidCount++; paidAmt += total; }
      const joinCell = exempt
        ? `<span class="toggle-btn" style="background:#e8f0ff;color:#3355aa;cursor:default;">🎖️운영진</span>`
        : `<button class="toggle-btn ${join?'join':'nojoin'}" onclick="toggleJoin('${name}')">${join?'✅참가':'❌불참'}</button>`;
      return `<tr class="${paid ? 'paid-row' : ''}">
        <td>${name}</td>
        <td>${joinCell}</td>
        <td class="amount">${exempt ? '<span style="color:#3355aa;font-size:11px;">면제</span>' : fmt(outing)}</td>
        <td class="amount">${fmt(container)}</td>
        <td class="amount total-col">${total.toLocaleString()}원</td>
        <td><button class="toggle-btn ${paid?'paid':'unpaid'}" onclick="togglePaid('${name}')">${paid?'✅납부':'⏳미납'}</button></td>
      </tr>`;
    }).join('');

    document.getElementById('sub-join').textContent = joinCount + '명 참가';
    document.getElementById('sub-outing').innerHTML = sumOuting.toLocaleString() + '원';
    document.getElementById('sub-container').innerHTML = sumContainer.toLocaleString() + '원';
    document.getElementById('sub-total').innerHTML = sumTotal.toLocaleString() + '원';
    document.getElementById('sub-paid').textContent = paidCount + '명 완료';
    document.getElementById('sum-paid').textContent = paidCount + '명';
    document.getElementById('sum-unpaid').textContent = (MEMBERS.length - paidCount) + '명';
    document.getElementById('sum-amount').textContent = paidAmt.toLocaleString() + '원';
  }

  render();
</script>
</body>
</html>
